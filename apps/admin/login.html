<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYMENEZ | System Core Access</title>
    
    <link rel="icon" type="image/png" href="mini_logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/admin_auth.css">
</head>
<body class="selection:bg-[#FFC300] selection:text-black bg-[#030305]">

    <div id="message-box" class="fixed top-6 left-1/2 transform -translate-x-1/2 px-4 md:px-6 py-2 md:py-3 rounded-full text-[10px] md:text-xs font-black tracking-widest uppercase shadow-2xl z-[9999] opacity-0 transition-all duration-500 pointer-events-none text-center w-11/12 max-w-[350px]"></div>

    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-[url('../../static/img/backgrounds/FONDO.png')] bg-cover bg-center opacity-10 grayscale mix-blend-overlay"></div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[40vw] h-[40vw] bg-[#FFC300]/5 blur-[100px] rounded-full"></div>
    </div>

    <div class="relative z-10 min-h-screen w-full flex items-center justify-center p-4 md:p-6 animate-premium-in">
        <div class="glass-panel p-6 md:p-12 w-full max-w-md mx-auto rounded-[24px] md:rounded-[32px]">
            
            <div class="text-center mb-8 md:mb-10">
                <div class="w-12 h-12 md:w-16 md:h-16 mx-auto bg-[#FFC300]/10 rounded-2xl flex items-center justify-center border border-[#FFC300]/20 mb-4">
                    <svg class="w-6 h-6 md:w-8 md:h-8 text-[#FFC300]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
                </div>
                <h1 class="text-xl md:text-2xl font-black text-white tracking-tighter uppercase mb-1">System Core</h1>
                <p class="text-gray-500 text-[8px] md:text-[9px] font-black uppercase tracking-[0.3em] md:tracking-[0.4em]">Personal Autorizado Únicamente</p>
            </div>

            <form id="admin-login-form" class="space-y-4 md:space-y-5">
                <div>
                    <label class="block text-[9px] md:text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 ml-1">Terminal ID</label>
                    <input type="email" id="login-email" class="w-full glass-input px-4 md:px-5 py-3 md:py-4 rounded-xl md:rounded-2xl text-white text-sm" placeholder="admin@gymenez.com" required>
                </div>
                <div>
                    <label class="block text-[9px] md:text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 ml-1">Llave de Seguridad</label>
                    <input type="password" id="login-password" class="w-full glass-input px-4 md:px-5 py-3 md:py-4 rounded-xl md:rounded-2xl text-white text-sm" placeholder="••••••••" required>
                </div>

                <div class="pt-3 md:pt-4">
                    <button type="submit" id="login-button" class="btn-gold w-full py-3 md:py-4 rounded-xl md:rounded-2xl font-black text-[10px] md:text-xs uppercase tracking-[0.2em] md:tracking-[0.25em]">
                        Verificar Credenciales
                    </button>
                </div>
            </form>
            
            <div class="mt-6 md:mt-8 pt-5 md:pt-6 border-t border-white/5 text-center flex flex-col items-center gap-4">
                <a href="/apps/start/login.html" class="text-[9px] md:text-[10px] font-bold text-gray-500 hover:text-white transition uppercase tracking-[0.1em] md:tracking-[0.2em]">
                    Volver a Plataforma de Atletas
                </a>
                
                <p class="text-[8px] md:text-[9px] text-gray-600 uppercase tracking-widest font-bold flex items-center justify-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-[#FFC300] animate-pulse shadow-[0_0_10px_rgba(255,195,0,0.8)]"></span> Servidor Protegido
                </p>
            </div>
        </div>
    </div>

    <script src="../../static/js/admin_auth.js"></script>
</body>
</html>
