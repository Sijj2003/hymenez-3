<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYMENEZ | Unirse al Ecosistema</title>
    
    <link rel="icon" type="image/png" href="/static/img/logos/mini_logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #030305; 
            color: white; 
            overflow: hidden; /* Evita scroll durante la carga */
            min-height: 100vh;
        }

        /* 🚀 FONDO PARALLAX */
        .parallax-bg {
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070');
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: absolute;
            inset: 0;
            z-index: 0;
            transform: scale(1.1);
            transition: transform 2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        body.loaded .parallax-bg { transform: scale(1); }

        .parallax-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(3,3,5,0.9) 0%, rgba(3,3,5,0.7) 50%, rgba(3,3,5,0.95) 100%);
            z-index: 1;
        }

        /* Glassmorphism Premium */
        .glass-panel {
            background: rgba(10, 10, 15, 0.45);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
            opacity: 0;
            transform: translateY(20px);
            filter: blur(10px);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        body.loaded .glass-panel {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
        }

        /* Input Styling */
        .glass-input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: white;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-input:focus {
            border-color: #FFC300;
            box-shadow: 0 0 15px rgba(255, 195, 0, 0.2);
            background: rgba(0, 0, 0, 0.8);
            outline: none;
        }

        select.glass-input option {
            background-color: #0a0a0f;
            color: white;
        }

        .btn-gold {
            background: linear-gradient(135deg, #FFC300 0%, #eab308 100%);
            color: #000;
            font-weight: 900;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(255, 195, 0, 0.35);
        }

        /* 📱 KINETIC CORE ANIMATION */
        .kinetic-orb {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,195,0,0.15) 0%, transparent 70%);
        }
        .kinetic-ring {
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-top-color: #FFC300;
            border-radius: 50%;
            animation: spinRing 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            filter: drop-shadow(0 0 8px #FFC300);
        }
        .kinetic-ring-inner {
            position: absolute;
            inset: 10px;
            border: 1.5px solid transparent;
            border-bottom-color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: spinRingInverse 1.5s linear infinite;
        }
        @keyframes spinRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spinRingInverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }

        /* Step Progress */
        .step-dot {
            width: 33.33%;
            height: 3px;
            background: rgba(255,255,255,0.05);
            transition: all 0.5s ease;
        }
        .step-dot.active {
            background: #FFC300;
            box-shadow: 0 0 10px rgba(255,195,0,0.5);
        }

        /* Curtain Preloader */
        #preloader {
            position: fixed;
            inset: 0;
            background: #030305;
            z-index: 10000;
            transition: opacity 1s ease;
        }

        /* Message Box */
        #message-box {
            position: fixed;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            z-index: 9999;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="selection:bg-[#FFC300] selection:text-black min-h-screen relative flex flex-col justify-between">
    
    <div id="preloader"></div>
    <div id="message-box"></div>

    <div class="parallax-bg"></div>
    <div class="parallax-overlay"></div>

    <nav class="relative w-full z-40 py-6 px-6 md:px-12 flex justify-between items-center bg-transparent transition-all duration-1000 delay-300 opacity-0 transform -translate-y-4" id="main-nav">
        <div class="flex items-center cursor-pointer group" onclick="window.location.href='/index.html'">
            <span class="text-[#FFC300] font-[900] text-2xl md:text-3xl italic tracking-tighter">GYM</span>
            <span class="text-white font-[900] text-2xl md:text-3xl italic tracking-tighter">ENEZ</span>
        </div>
        
        <div class="flex items-center gap-5 md:gap-6">
            <a href="/index.html" class="text-[10px] font-black tracking-widest text-gray-400 hover:text-white transition uppercase whitespace-nowrap">Regresar</a>
            <a href="login.html" class="border border-white/10 bg-white/5 text-white hover:bg-white hover:text-black px-5 py-2 rounded-full text-[10px] font-black tracking-widest transition-all uppercase whitespace-nowrap">Ingresar</a>
        </div>
    </nav>

    <main id="register-container" class="relative z-10 w-full flex-grow flex items-center justify-center p-4 md:p-8">
        <div class="glass-panel p-6 md:p-10 w-full max-w-xl rounded-[28px] md:rounded-[36px] flex flex-col justify-between relative overflow-hidden min-h-[480px]">
            
            <div class="absolute top-0 left-0 w-full flex">
                <div id="dot-1" class="step-dot active"></div>
                <div id="dot-2" class="step-dot"></div>
                <div id="dot-3" class="step-dot"></div>
            </div>

            <div class="text-center mb-8 mt-4">
                <h1 id="register-title" class="text-2xl md:text-3xl font-[900] text-white uppercase tracking-tighter transition-all duration-300">Identidad Base</h1>
                <p id="register-subtitle" class="text-gray-500 text-[9px] md:text-[10px] font-black uppercase tracking-[0.3em] mt-1.5">Paso 1 de 3 • Datos de Cuenta</p>
            </div>

            <form id="multi-step-form" class="flex-grow flex flex-col justify-between" onsubmit="return false;">
                
                <div id="step-section-1" class="space-y-5 transition-all duration-500">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Nombre</label>
                            <input type="text" id="reg-name" required class="w-full glass-input px-5 py-4 rounded-xl text-white text-xs uppercase font-bold" placeholder="Ej. Carlos" oninput="this.value = this.value.replace(/[^A-Za-zÁéíóúÁÉÍÓÚñÑ ]/g, '')">
                        </div>
                        <div>
                            <label class="block text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Apellido</label>
                            <input type="text" id="reg-lastname" required class="w-full glass-input px-5 py-4 rounded-xl text-white text-xs uppercase font-bold" placeholder="Ej. Mendoza" oninput="this.value = this.value.replace(/[^A-Za-zÁéíóúÁÉÍÓÚñÑ ]/g, '')">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Correo Electrónico Verificado</label>
                        <input type="email" id="reg-email" required maxlength="25" class="w-full glass-input px-5 py-4 rounded-xl text-white text-xs font-medium" placeholder="atleta@gymenez.com">
                    </div>
                    <div class="pt-6">
                        <button type="button" onclick="goToStep(2)" class="w-full btn-gold py-4 md:py-5 rounded-xl text-[10px] uppercase tracking-[0.25em]">Continuar</button>
                    </div>
                </div>

                <div id="step-section-2" class="hidden opacity-0 space-y-5 transition-all duration-500">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Nacimiento</label>
                            <input type="text" id="reg-dob" required class="w-full glass-input px-5 py-4 rounded-xl text-white text-xs font-mono" placeholder="DD/MM/YYYY" maxlength="10" oninput="applyDateMask(event)">
                        </div>
                        <div>
                            <label class="block text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Sexo Biológico</label>
                            <select id="reg-sex" class="w-full glass-input px-5 py-4 rounded-xl text-white text-xs font-bold appearance-none cursor-pointer" required>
                                <option value="" disabled selected>Seleccionar...</option>
                                <option value="Hombre">Hombre</option>
                                <option value="Mujer">Mujer</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-1.5 ml-1">WhatsApp</label>
                        <div class="flex gap-2">
                            <select id="reg-phone-prefix" class="w-24 px-2 py-4 rounded-xl glass-input text-white text-xs font-bold text-center cursor-pointer">
                                <option value="0414">0414</option>
                                <option value="0424">0424</option>
                                <option value="0412">0412</option>
                                <option value="0422">0422</option>
                                <option value="0416">0416</option>
                                <option value="0426">0426</option>
                            </select>
                            <input type="text" id="reg-phone-num" required minlength="7" maxlength="7" class="flex-1 glass-input px-5 py-4 rounded-xl text-white text-xs font-mono" placeholder="1234567" oninput="this.value = this.value.replace(/\D/g, '')">
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-3 pt-6">
                        <button type="button" onclick="goToStep(1)" class="bg-white/5 border border-white/10 text-white font-bold text-[9px] uppercase tracking-widest rounded-xl hover:bg-white/10 transition py-4 md:py-5">Atrás</button>
                        <button type="button" onclick="goToStep(3)" class="col-span-2 btn-gold py-4 md:py-5 rounded-xl text-[10px] uppercase tracking-[0.25em]">Continuar</button>
                    </div>
                </div>

                <div id="step-section-3" class="hidden opacity-0 space-y-6 transition-all duration-500">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] text-center mb-4">Define tu Clave Secreta</label>
                        <input type="password" id="reg-password" minlength="6" maxlength="18" required class="w-full glass-input px-5 py-5 rounded-xl text-white text-center text-xl font-mono tracking-[0.5em]" placeholder="••••••">
                        <span class="block text-[8px] text-gray-500 text-center uppercase tracking-widest mt-2">La longitud debe tener entre 6 y 18 caracteres</span>
                    </div>
                    <div class="grid grid-cols-3 gap-3 pt-4">
                        <button type="button" onclick="goToStep(2)" class="bg-white/5 border border-white/10 text-white font-bold text-[9px] uppercase tracking-widest rounded-xl hover:bg-white/10 transition py-4 md:py-5">Atrás</button>
                        <button type="button" onclick="processSecureRegistration()" class="col-span-2 btn-gold py-4 md:py-5 rounded-xl text-[10px] uppercase tracking-[0.25em]">Activar Perfil</button>
                    </div>
                </div>

            </form>
        </div>
    </main>

    <div id="setup-screen" class="fixed inset-0 bg-[#030305] z-[5000] hidden flex flex-col items-center justify-center p-6 text-center transition-all duration-1000 opacity-0">
        <div class="kinetic-orb mb-12 flex items-center justify-center scale-125">
            <div class="kinetic-ring"></div>
            <div class="kinetic-ring-inner"></div>
            <div class="w-3 h-3 bg-[#FFC300] rounded-full shadow-[0_0_15px_#FFC300]"></div>
        </div>
        <h2 id="setup-message" class="text-2xl md:text-4xl font-black text-white uppercase tracking-tighter max-w-lg transition-all duration-700 transform scale-95 opacity-0 filter blur-[6px]">Iniciando</h2>
        <p class="text-gray-600 text-[9px] font-black uppercase tracking-[0.5em] mt-8">Ecosistema GYMENEZ PERFORMANCE</p>
    </div>

    <footer class="relative z-10 py-8 text-center border-t border-white/5 mt-auto opacity-40 transition-all duration-1000 delay-500" id="main-footer">
        <p class="text-[9px] font-bold uppercase tracking-[0.5em] text-gray-600">© 2026 GYMENEZ PERFORMANCE • TU MEJOR VERSIÓN</p>
    </footer>

    <script>
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            const nav = document.getElementById('main-nav');
            const footer = document.getElementById('main-footer');

            preloader.style.opacity = '0';
            setTimeout(() => {
                preloader.style.display = 'none';
                document.body.classList.add('loaded');
                
                nav.classList.remove('opacity-0', '-translate-y-4');
                footer.classList.remove('opacity-0');
            }, 1000);
        });

        const isLocalHostEnvironment = window.location.hostname === '127.0.0.1' || 
                                       window.location.hostname === 'localhost' || 
                                       window.location.protocol === 'file:';

        const API_BASE_URL = isLocalHostEnvironment ? 'http://127.0.0.1:5000' : 'https://sijj2003.pythonanywhere.com';
        
        let activeStep = 1;

        function applyDateMask(e) {
            if (e.inputType === 'deleteContentBackward') return;
            const input = e.target;
            let v = input.value.replace(/\D/g, '');
            if (v.length > 8) v = v.substring(0, 8);
            let formatted = v;
            if (v.length >= 5) formatted = `${v.substring(0, 2)}/${v.substring(2, 4)}/${v.substring(4)}`;
            else if (v.length >= 3) formatted = `${v.substring(0, 2)}/${v.substring(2)}`;
            input.value = formatted;
        }

        function showUIFeedback(message, type = 'error') {
            const box = document.getElementById('message-box');
            if(!box) return;
            box.textContent = message;
            box.className = 'fixed top-6 left-1/2 transform -translate-x-1/2 px-5 py-3 rounded-full text-[10px] font-black tracking-widest uppercase shadow-2xl z-[9999] transition-all duration-400 text-center border backdrop-blur-md w-11/12 max-w-[360px]';
            if(type === 'success') {
                box.classList.add('bg-emerald-950/80', 'text-emerald-400', 'border-emerald-500/30');
            } else {
                box.classList.add('bg-red-950/80', 'text-red-400', 'border-red-500/30');
            }
            box.style.opacity = '1';
            box.style.transform = 'translate(-50%, 0)';
            setTimeout(() => {
                box.style.opacity = '0';
                box.style.transform = 'translate(-50%, -20px)';
            }, 4000);
        }

        function validateFields(step) {
            const letterRegex = /^[A-Za-zÁéíóúÁÉÍÓÚñÑ ]+$/;

            if (step === 1) {
                const name = document.getElementById('reg-name').value.trim();
                const lastname = document.getElementById('reg-lastname').value.trim();
                const email = document.getElementById('reg-email').value.trim();

                if (!name || !letterRegex.test(name) || !lastname || !letterRegex.test(lastname)) {
                    showUIFeedback("Nombre y Apellido solo deben contener letras.", "error");
                    return false;
                }
                if (!email || email.length > 25 || !document.getElementById('reg-email').checkValidity()) {
                    showUIFeedback("Ingresa un correo válido (Máximo 25 caracteres).", "error");
                    return false;
                }
            }
            if (step === 2) {
                const dob = document.getElementById('reg-dob').value.trim();
                const sex = document.getElementById('reg-sex').value;
                const phone = document.getElementById('reg-phone-num').value.trim();
                
                if (dob.length !== 10) {
                    showUIFeedback("Ingresa una fecha de nacimiento válida (DD/MM/YYYY).", "error");
                    return false;
                }
                if (!sex) {
                    showUIFeedback("Selecciona tu sexo biológico.", "error");
                    return false;
                }
                if (phone.length !== 7 || /\D/.test(phone)) {
                    showUIFeedback("El número móvil de WhatsApp debe tener exactamente 7 dígitos numéricos.", "error");
                    return false;
                }
            }
            return true;
        }

        function goToStep(nextStep) {
            if (nextStep > activeStep && !validateFields(activeStep)) return;

            const currentSection = document.getElementById(`step-section-${activeStep}`);
            const nextSection = document.getElementById(`step-section-${nextStep}`);
            
            currentSection.style.opacity = '0';
            currentSection.style.transform = nextStep > activeStep ? 'translateX(-20px)' : 'translateX(20px)';
            document.getElementById(`dot-${activeStep}`).classList.remove('active');

            setTimeout(() => {
                currentSection.classList.add('hidden');
                nextSection.classList.remove('hidden');
                
                setTimeout(() => {
                    nextSection.style.opacity = '1';
                    nextSection.style.transform = 'translateX(0)';
                    document.getElementById(`dot-${nextStep}`).add('active');
                    
                    const titles = { 1: "Identidad Base", 2: "Biometría Básica", 3: "Seguridad" };
                    document.getElementById('register-title').textContent = titles[nextStep];
                    activeStep = nextStep;
                }, 50);
            }, 400);
        }

        async function processSecureRegistration() {
            const password = document.getElementById('reg-password').value;
            if(password.length < 6 || password.length > 18) {
                showUIFeedback("La contraseña debe contener entre 6 y 18 caracteres.", "error");
                return;
            }

            const athleteName = document.getElementById('reg-name').value.trim().toUpperCase();
            const btn = document.querySelector('#step-section-3 .btn-gold');
            btn.disabled = true;
            btn.textContent = "VALIDANDO IDENTIDAD...";

            const ciPlaceholder = `V-TEMP-${Date.now().toString().slice(-6)}`; 
            const payload = {
                email: document.getElementById('reg-email').value.trim().toLowerCase(),
                password: password,
                name: athleteName,
                last_name: document.getElementById('reg-lastname').value.trim().toUpperCase(),
                id_number: ciPlaceholder,
                phone_number: `${document.getElementById('reg-phone-prefix').value}-${document.getElementById('reg-phone-num').value.trim()}`,
                dob: document.getElementById('reg-dob').value.trim(),
                sex: document.getElementById('reg-sex').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.status === 429) {
                    showUIFeedback("Múltiples intentos detectados. Espera 60 segundos.", "error");
                    btn.disabled = false;
                    btn.textContent = "Activar Perfil";
                    return;
                }

                const data = await response.json();

                if (response.ok && data.success) {
                    triggerCinematicSetup(athleteName);
                } else {
                    showUIFeedback(data.error || "No se pudo procesar el alta.", "error");
                    btn.disabled = false;
                    btn.textContent = "Activar Perfil";
                }
            } catch (err) {
                showUIFeedback("Fallo de conexión perimetral con el servidor.", "error");
                btn.disabled = false;
                btn.textContent = "Activar Perfil";
            }
        }

        function triggerCinematicSetup(name) {
            const container = document.getElementById('register-container');
            const setup = document.getElementById('setup-screen');

            container.style.opacity = '0';
            container.style.transform = 'scale(0.95)';

            setTimeout(() => {
                container.classList.add('hidden');
                setup.classList.remove('hidden');
                setTimeout(() => {
                    setup.classList.remove('opacity-0');
                    runSequence(name);
                }, 100);
            }, 600);
        }

        function runSequence(name) {
            const steps = [
                { text: `Hola, ${name}`, time: 0 },
                { text: "Creando tu perfil en el Núcleo...", time: 1800 },
                { text: "Estructurando tu entrenamiento...", time: 3600 },
                { text: "Asegurando tu acceso...", time: 5400 },
                { text: "¡Bienvenido a la Élite!", time: 7200 }
            ];

            steps.forEach(s => {
                setTimeout(() => {
                    const msgElement = document.getElementById('setup-message');
                    msgElement.classList.add('opacity-0', 'blur-[6px]');
                    setTimeout(() => {
                        msgElement.textContent = s.text;
                        msgElement.classList.remove('opacity-0', 'blur-[6px]');
                        msgElement.classList.add('opacity-100', 'blur-0');
                    }, 300);
                }, s.time);
            });

            setTimeout(() => window.location.href = 'login.html', 8800);
        }
    </script>
</body>
</html>
