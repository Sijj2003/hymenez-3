<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYMENEZ - Trainer Dashboard</title>
    <link rel="icon" type="image/png" href="mini_logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d0d1a;
            background-image: url('FONDO.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #e5e7eb;
        }
        .glass-panel {
            background: rgba(13, 13, 26, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .card-athlete {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .custom-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.6rem;
            border-radius: 0.75rem;
            width: 100%;
            font-size: 0.85rem;
        }
        .custom-input:focus { border-color: #facc15; outline: none; }
        
        /* Modal Animation */
        #profile-modal { transition: opacity 0.3s ease; }
        .modal-content { transform: scale(0.95); transition: transform 0.3s ease; }
        #profile-modal.active .modal-content { transform: scale(1); }
    </style>
</head>
<body class="min-h-screen flex">

    <aside class="w-64 glass-panel border-r border-white/5 flex flex-col hidden md:flex">
        <div class="p-6">
            <h1 class="text-2xl font-black tracking-tighter"><span class="text-yellow-400">GYM</span>ENEZ</h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">Staff Profesional</p>
        </div>

        <nav class="flex-grow px-4 space-y-2">
            <a href="#" class="flex items-center p-3 rounded-lg text-sm font-semibold bg-yellow-400/10 text-yellow-400 border-l-4 border-yellow-400">
                Mis Entrenados
            </a>
            <button onclick="openProfileModal()" class="w-full flex items-center p-3 rounded-lg text-sm font-semibold text-gray-400 hover:bg-white/5 hover:text-white transition">
                Mi Perfil Profesional
            </button>
        </nav>

        <div class="p-4 border-t border-white/5">
            <button onclick="logout()" class="w-full flex items-center p-3 text-red-400 hover:bg-red-500/10 rounded-lg text-sm transition font-bold">
                Cerrar Sesión
            </button>
        </div>
    </aside>

    <main class="flex-grow pt-8 px-8">
        <header class="flex justify-between items-end mb-10">
            <div>
                <h2 id="welcome-name" class="text-4xl font-black text-white">Hola, Coach</h2>
                <p id="top-specialty" class="text-yellow-400 font-medium uppercase text-[10px] tracking-widest mt-1">Cargando perfil...</p>
            </div>
        </header>

        <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card-athlete p-6 rounded-2xl">
                <div class="flex justify-between items-start mb-6">
                    <h4 class="font-bold">Marcos Pérez</h4>
                    <span class="px-2 py-1 bg-yellow-400/20 text-yellow-400 text-[9px] font-bold rounded">PLAN ACTIVO</span>
                </div>
                <button class="w-full py-3 bg-white/5 hover:bg-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest transition">Gestionar Entrenamiento</button>
            </div>
        </section>
    </main>

    <div id="profile-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
        <div class="modal-content glass-panel w-full max-w-2xl p-8 rounded-3xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-black text-white">Mi Perfil Profesional</h3>
                <button onclick="closeProfileModal()" class="text-gray-500 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <form id="profile-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Nombre</label>
                        <input type="text" id="p-first_name" name="first_name" class="custom-input mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Apellido</label>
                        <input type="text" id="p-last_name" name="last_name" class="custom-input mt-1">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Especialidad</label>
                        <input type="text" id="p-specialty" name="specialty" class="custom-input mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Cédula / ID</label>
                        <input type="text" id="p-id_number" name="id_number" class="custom-input mt-1">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Horario de Trabajo</label>
                    <input type="text" id="p-schedule" name="schedule" class="custom-input mt-1">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Estado</label>
                        <input type="text" id="p-state" name="state" class="custom-input mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Ciudad</label>
                        <input type="text" id="p-city" name="city" class="custom-input mt-1">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Títulos / Estudios</label>
                    <textarea id="p-titles" name="titles" rows="3" class="custom-input mt-1"></textarea>
                </div>

                <button type="submit" class="w-full bg-yellow-400 hover:bg-yellow-500 text-black font-black py-4 rounded-2xl shadow-lg transition-transform active:scale-95">
                    ACTUALIZAR MI INFORMACIÓN
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://sijj2003.pythonanywhere.com";
        let currentTrainerId = null;

        // Inicializar datos al cargar
        window.onload = async () => {
            const session = JSON.parse(localStorage.getItem('trainerSession'));
            if (!session) {
                window.location.href = 'trainer.html';
                return;
            }
            currentTrainerId = session.id;
            loadDashboardHeader(session);
        };

        function loadDashboardHeader(data) {
            document.getElementById('welcome-name').textContent = `Hola, Coach ${data.first_name || ''}`;
            document.getElementById('top-specialty').textContent = data.specialty || 'Staff GYMENEZ';
        }

        // Gestión del Modal de Perfil
        async function openProfileModal() {
            const modal = document.getElementById('profile-modal');
            modal.classList.add('active', 'opacity-100', 'pointer-events-auto');

            // Consultar datos frescos a la API con la ruta GET creada
            try {
                const res = await fetch(`${API_URL}/api/trainer/profile/${currentTrainerId}`);
                const data = await res.json();
                if (data.success) {
                    const p = data.profile;
                    document.getElementById('p-first_name').value = p.first_name || '';
                    document.getElementById('p-last_name').value = p.last_name || '';
                    document.getElementById('p-id_number').value = p.id_number || '';
                    document.getElementById('p-specialty').value = p.specialty || '';
                    document.getElementById('p-schedule').value = p.schedule || '';
                    document.getElementById('p-state').value = p.state || '';
                    document.getElementById('p-city').value = p.city || '';
                    document.getElementById('p-titles').value = p.titles || '';
                }
            } catch (err) { console.error("Error cargando perfil:", err); }
        }

        function closeProfileModal() {
            const modal = document.getElementById('profile-modal');
            modal.classList.remove('active', 'opacity-100', 'pointer-events-auto');
        }

        // Guardar Cambios (Ruta POST)
        document.getElementById('profile-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = Object.fromEntries(new FormData(e.target));
            
            try {
                const res = await fetch(`${API_URL}/api/trainer/profile/${currentTrainerId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const data = await res.json();
                if (data.success) {
                    alert("Perfil actualizado correctamente");
                    // Actualizar el header del dashboard
                    loadDashboardHeader(formData);
                    closeProfileModal();
                }
            } catch (err) { alert("Error al guardar"); }
        };

        function logout() {
            localStorage.removeItem('trainerSession');
            window.location.href = 'trainer.html';
        }
    </script>
</body>
</html>
